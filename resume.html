<!DOCTYPE html>

    <link rel="stylesheet" href="assets/styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-top: 20px;
        }

        .resume-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px auto;
            max-width: 1200px;
        }

        .resume-box {
            border: 2px solid #007BFF;
            border-radius: 10px;
            padding: 30px;
            background-color: #f8f9fa;
        }
        
        .resume-box p {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .resume-box a {
            display: block;
            margin: 10px auto;
            padding: 12px 24px;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            border-radius: 5px;
            max-width: 200px;
            font-weight: bold;
        }

        .resume-box a:hover {
            background-color: #0056b3;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav li {
            display: inline;
            margin: 0 15px;
        }

        nav a {
            text-decoration: none;
            color: #0073b1;
            font-weight: bold;
        }
    </style>
</head>
